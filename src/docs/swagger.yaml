openapi: 3.0.0
info:
  title: Home Services API
  version: 1.0.0
servers:
  - url: http://localhost:5000
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: Healthy
  /api/auth/signup:
    post:
      summary: Signup
  /api/auth/login:
    post:
      summary: Login
  /api/users/me:
    get:
      summary: Get my profile
    put:
      summary: Update my profile
  /api/categories:
    get:
      summary: List categories
  /api/categories/{id}:
    get:
      summary: Get category by id
  /api/services:
    get:
      summary: List services with filters
  /api/services/{id}:
    get:
      summary: Get service details
  /api/services/popular:
    get:
      summary: Popular services
  /api/services/featured:
    get:
      summary: Featured services
  /api/services/recommended:
    get:
      summary: Recommended services (auth)
  /api/services/{id}/availability:
    get:
      summary: Check service availability
  /api/bookings:
    post:
      summary: Create booking
  /api/bookings/my:
    get:
      summary: Get my bookings
  /api/reviews:
    post:
      summary: Create review
  /api/reviews/service/{id}:
    get:
      summary: Get service reviews
